<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benjamin Sharpe | Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="site-master-container">

    <div class="main-bg-layer"></div>
    
    <div id="tinder-heart" class="floating-ui-element">❤️</div>

    <div class="vertical-layout-stack">
        <header class="section-module">
            <div class="glass-panel">
                <div class="text-content">
                    <h1 class="main-heading">Benjamin Sharpe</h1>
                    <p class="sub-heading">Follow the journey across the web</p>
                </div>
                <nav class="navigation-hub">
                    <a href="https://www.twitch.tv/benjamindsharpe" target="_blank" class="action-btn twitch-primary">
                        <i class="fab fa-twitch"></i><span>Twitch</span>
                    </a>
                    <a href="https://www.facebook.com/xbenjaminsharpe" target="_blank" class="action-btn fb-primary">
                        <i class="fab fa-facebook"></i><span>Facebook</span>
                    </a>
                    <a href="https://www.instagram.com/benjaminsharpe_/" target="_blank" class="action-btn ig-primary">
                        <i class="fab fa-instagram"></i><span>Instagram</span>
                    </a>
                </nav>
            </div>
        </header>

        <main class="section-module">
            <div class="glass-panel">
                <h2 class="section-title">AI Interaction Core</h2>
                <div class="accent-divider"></div>
                
                <div class="portal-container" style="text-align: center; padding: 20px;">
                    <p style="color: white; margin-bottom: 20px; opacity: 0.8;">Enter the official private chat interface</p>
                    
                    <a href="chat.html" class="action-btn twitch-primary" style="text-decoration: none; display: inline-flex; width: 100%; justify-content: center; padding: 15px 0; font-size: 1.2rem;">
                        <i class="fas fa-comment-alt"></i><span>Open Official Chat</span>
                    </a>
                </div>
            </div>
        </main>

        <div class="redirect-wrap">
            <button id="execute-ai" class="surprise-btn">
                <i class="fas fa-random"></i> Surprise Me
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
