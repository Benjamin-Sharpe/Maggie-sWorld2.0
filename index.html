<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Just Goon | Official Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="site-master-container">

    <canvas id="particle-canvas" class="background-canvas-layer"></canvas>

    <div class="vertical-layout-stack">

        <header class="section-module hero-module">
            <div class="glass-panel">
                <div class="text-content">
                    <h1 class="main-heading">Benjamin Sharpe</h1>
                    <p class="sub-heading">Follow the journey across the web</p>
                </div>
                
                <nav class="navigation-hub">
                    <a href="https://www.twitch.tv/benjamindsharpe" target="_blank" class="action-btn twitch-primary">
                        <i class="fab fa-twitch"></i>
                        <span class="btn-label">Twitch</span>
                    </a>
                    <a href="https://www.facebook.com/xbenjaminsharpe" target="_blank" class="action-btn fb-primary">
                        <i class="fab fa-facebook"></i>
                        <span class="btn-label">Facebook</span>
                    </a>
                    <a href="https://www.instagram.com/benjaminsharpe_/" target="_blank" class="action-btn ig-primary">
                        <i class="fab fa-instagram"></i>
                        <span class="btn-label">Instagram</span>
                    </a>
                </nav>
            </div>
        </header>

        <main class="section-module team-module">
            <div class="glass-panel team-panel">
                <div class="panel-header">
                    <h2 class="section-title">AI Interaction Core</h2>
                    <div class="accent-divider"></div>
                </div>
                
                <div class="chat-interface">
                    <div id="chat-log" class="chat-display">
                        <p class="ai-msg">Connection secure. Looking for something specific, or just here to flirt?</p>
                    </div>
                    <div class="input-group">
                        <input type="text" id="user-input" placeholder="Type a message...">
                        <button id="send-btn">Send</button>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
